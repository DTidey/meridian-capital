[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long — formatter handles it
    "SIM108", # ternary operator — often less readable
]

[tool.ruff.lint.per-file-ignores]
"run_data.py" = ["E402"]   # sys.path insert must precede local imports

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"
